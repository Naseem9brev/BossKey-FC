<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BossKey FC</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hd">
      <span class="logo">&#9917;</span>
      <div>
        <h1>BossKey FC</h1>
        <p class="tag">Stealth scores at work</p>
      </div>
      <label class="switch" title="Enable overlay">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </header>

    <nav class="tabs" aria-label="Popup sections">
      <button class="tab on" data-tab="dashboard" type="button">Dashboard</button>
      <button class="tab" data-tab="settings" type="button">Settings</button>
    </nav>

    <main class="tab-panel" data-panel="dashboard">
      <section class="card">
        <h2>Live now</h2>
        <div id="scores" class="scores">Loading&#8230;</div>
        <button id="refresh" class="ghost">Refresh scores</button>
        <p id="source" class="hint"></p>
      </section>

      <section class="card">
        <h2>Disguise</h2>
        <div class="seg" id="disguise">
          <button data-mode="off" class="seg-btn">Off</button>
          <button data-mode="sheets" class="seg-btn">Sheets</button>
          <button data-mode="slack" class="seg-btn">Slack</button>
          <button data-mode="jira" class="seg-btn">Jira</button>
        </div>
      </section>

      <section class="card">
        <h2>Boss-safe excuse</h2>
        <button id="excuse" class="primary">Generate excuse</button>
        <div id="excuseOut" class="excuse" hidden></div>
      </section>
    </main>

    <main class="tab-panel" data-panel="settings" hidden>
      <section class="card">
        <h2>Extension settings</h2>
        <label class="field">
          <span>Favorite team</span>
          <input type="text" id="favoriteTeam" placeholder="e.g. England" />
        </label>
        <label class="field">
          <span>Poll every (min)</span>
          <input type="number" id="pollMinutes" min="0.5" step="0.5" />
        </label>
        <label class="field">
          <span>Scores endpoint</span>
          <input type="text" id="scoresEndpoint" placeholder="Leave blank for default" />
        </label>
      </section>

      <section class="card">
        <h2>API keys</h2>
        <label class="field stack">
          <span>Groq API key</span>
          <input type="password" id="groqApiKey" placeholder="gsk_&#8230; (for excuses)" autocomplete="off" />
        </label>
        <div class="actions">
          <button id="clearGroqApiKey" class="ghost" type="button">Clear key</button>
        </div>
        <p class="hint">
          Saved in Chrome sync storage. Used only when generating boss-safe excuses.
        </p>
      </section>
    </main>

    <footer class="ft">
      <span>Alt+W toggle</span>
      <span>Esc panic</span>
      <span id="status"></span>
    </footer>

    <script src="../shared/config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
